kind = "web"
previewPath = "/"
title = "GangaRam Mulchaand and Sons"
version = "1.0.0"
id = "artifacts/shop-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22696

[services.development]
run = "pnpm --filter @workspace/shop-app run dev"

[services.production]
build = [ "sh", "-c", "pnpm --filter @workspace/shop-app run build && pnpm --filter @workspace/api-server run build" ]
run = [ "node", "artifacts/api-server/dist/index.cjs" ]

[services.env]
PORT = "22696"
BASE_PATH = "/"
